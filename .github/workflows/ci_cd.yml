name: CI/CD - TPA Admin API

on:
  push:
    branches:
      - main
      - develop  # develop 브랜치 추가
  workflow_dispatch:

env:
  # 공통 이미지 이름
  IMAGE_NAME: tpa-admin-travel-api

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Source
        uses: actions/checkout@v6

      # 환경별 변수 설정 (Prod vs Dev)
      - name: Set Environment Variables
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "TARGET_ENV=prod" >> $GITHUB_ENV
            echo "DEPLOY_PATH=/home/nex3/app/tpa-admin-travel-api" >> $GITHUB_ENV
            echo "DOCKER_TAG=prod" >> $GITHUB_ENV
          else
            echo "TARGET_ENV=dev" >> $GITHUB_ENV
            echo "DEPLOY_PATH=/home/nex3/app/tpa-admin-travel-api" >> $GITHUB_ENV
            echo "DOCKER_TAG=dev" >> $GITHUB_ENV
          fi

      - name: Docker Image Build
        run: |
          echo "🐳 Build Docker Images (${{ env.TARGET_ENV }})"
          # 환경별 태그 사용 (:prod 또는 :dev)
          docker build \
            --network=host \
            -t ${{ env.IMAGE_NAME }}:${{ env.DOCKER_TAG }} -f Dockerfile .

      - name: Prepare & Execute Deployment
        run: |
          mkdir -p ${{ env.DEPLOY_PATH }}
          
          cp docker-compose.yml ${{ env.DEPLOY_PATH }}/
          cp scripts/deploy.sh ${{ env.DEPLOY_PATH }}/ # scripts 폴더 안에 있다면 유지
          # 루트에 deploy.sh가 있다면 cp deploy.sh ${{ env.DEPLOY_PATH }}/ 로 변경
          
          chmod +x ${{ env.DEPLOY_PATH }}/deploy.sh
          
          # 배포 스크립트 실행
          cd ${{ env.DEPLOY_PATH }}
          ./deploy.sh ${{ env.TARGET_ENV }}

      - name: Cleanup Docker
        run: docker image prune -f